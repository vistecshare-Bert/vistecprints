name: Deploy to HostGator

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/deploy_out.txt -w "%{http_code}" \
            "https://rebuild.vistecprints.com/deploy.php?token=${{ secrets.DEPLOY_TOKEN }}")
          cat /tmp/deploy_out.txt
          echo ""
          echo "HTTP status: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "200" ] || { echo "Deploy failed"; exit 1; }
