name: Deploy to HostGator

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          RESULT=$(curl -sf "https://rebuild.vistecprints.com/deploy.php?token=${{ secrets.DEPLOY_TOKEN }}")
          echo "$RESULT"
