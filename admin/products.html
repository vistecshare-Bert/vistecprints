<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Catalog — VistecPrints Staff</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --black:#0a0a0a;--dark:#111;--dark2:#1a1a1a;--dark3:#222;--dark4:#2a2a2a;
  --gold:#D49848;--gold-light:#E8B96A;--white:#fff;--offwhite:#F0EDE8;
  --gray:#888;--gray2:#555;--red:#e05555;
}
body{background:var(--black);color:var(--offwhite);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;}
a{color:var(--gold);text-decoration:none;}

/* HEADER */
.header{background:var(--dark);border-bottom:1px solid rgba(212,152,72,0.2);padding:16px 32px;display:flex;align-items:center;gap:24px;position:sticky;top:0;z-index:100;}
.header-title{font-size:18px;font-weight:600;color:var(--offwhite);}
.header-sub{font-size:12px;color:var(--gray);margin-top:2px;}
.header-back{color:var(--gray);font-size:12px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--gray2);padding:6px 14px;border-radius:3px;transition:all 0.2s;}
.header-back:hover{color:var(--gold);border-color:var(--gold);}

/* SUPPLIER TABS */
.supplier-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 32px;background:var(--dark2);}
.stab{padding:14px 24px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;}
.stab:hover{color:var(--offwhite);}
.stab.active{color:var(--gold);border-bottom-color:var(--gold);}
.stab-count{display:inline-block;background:var(--dark3);color:var(--gray);font-size:10px;padding:2px 6px;border-radius:10px;margin-left:6px;}
.stab.active .stab-count{background:rgba(212,152,72,0.15);color:var(--gold);}

/* TOOLBAR */
.toolbar{padding:16px 32px;display:flex;align-items:center;gap:12px;background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.06);}
.search-wrap{position:relative;flex:1;max-width:400px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.4;}
.search-input{width:100%;background:var(--dark3);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:8px 12px 8px 34px;color:var(--offwhite);font-size:13px;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--gray2);}
.filter-select{background:var(--dark3);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:8px 12px;color:var(--offwhite);font-size:12px;outline:none;cursor:pointer;}
.results-count{margin-left:auto;font-size:12px;color:var(--gray);}

/* GRID */
.catalog-wrap{padding:24px 32px;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
.product-card{background:var(--dark2);border:1px solid rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;transition:transform 0.2s,border-color 0.2s;cursor:default;}
.product-card:hover{transform:translateY(-2px);border-color:rgba(212,152,72,0.3);}
.card-img{aspect-ratio:1;background:var(--dark3);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-img img{width:80%;height:80%;object-fit:contain;}
.card-img .no-img{font-size:11px;color:var(--gray2);text-align:center;padding:8px;}
.card-body{padding:10px 12px;}
.card-code{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:0.5px;}
.card-name{font-size:12px;color:var(--offwhite);margin:3px 0;line-height:1.3;}
.card-brand{font-size:11px;color:var(--gray);}
.card-price{font-size:11px;color:var(--gray2);margin-top:4px;}
.card-supplier{display:inline-block;font-size:9px;letter-spacing:0.5px;text-transform:uppercase;padding:2px 6px;border-radius:2px;margin-top:6px;}
.sup-cm{background:rgba(100,180,100,0.15);color:#6db56d;}
.sup-ac{background:rgba(100,150,220,0.15);color:#7aaddd;}
.sup-mb{background:rgba(180,130,100,0.15);color:#c8956a;}
.sup-sm{background:rgba(212,152,72,0.15);color:var(--gold);}

/* SUPPLIER INFO BAR */
.supplier-info{display:none;background:var(--dark2);border-bottom:1px solid rgba(255,255,255,0.06);padding:14px 32px;}
.supplier-info.show{display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
.si-name{font-size:14px;font-weight:600;color:var(--offwhite);}
.si-field{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:6px;}
.si-field svg{opacity:0.5;flex-shrink:0;}
.si-field a{color:var(--gold);}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:32px 0 48px;}
.page-btn{background:var(--dark3);border:1px solid rgba(255,255,255,0.1);color:var(--offwhite);padding:7px 14px;border-radius:4px;cursor:pointer;font-size:12px;transition:all 0.2s;}
.page-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
.page-btn:disabled{opacity:0.3;cursor:default;}
.page-btn.active{background:rgba(212,152,72,0.15);border-color:var(--gold);color:var(--gold);}
.page-info{font-size:12px;color:var(--gray);padding:0 8px;}

/* LOADING */
.loading{text-align:center;padding:80px 0;color:var(--gray);}
.loading-spinner{width:32px;height:32px;border:2px solid var(--dark3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:80px 0;color:var(--gray);}
</style>
</head>
<body>

<div class="header">
  <a href="index.php" class="header-back">← Dashboard</a>
  <div>
    <div class="header-title">Product Catalog</div>
    <div class="header-sub">4,256 blank products across 4 suppliers</div>
  </div>
</div>

<div class="supplier-tabs">
  <div class="stab active" data-supplier="all" data-file="">All Suppliers <span class="stab-count">4,256</span></div>
  <div class="stab" data-supplier="carolina-made" data-file="../suppliers/carolina-made.json">Carolina Made <span class="stab-count">50</span></div>
  <div class="stab" data-supplier="as-colour-us" data-file="../suppliers/as-colour-us.json">AS Colour US <span class="stab-count">348</span></div>
  <div class="stab" data-supplier="momentec-brands" data-file="../suppliers/momentec-brands.json">Momentec Brands <span class="stab-count">873</span></div>
  <div class="stab" data-supplier="sanmar" data-file="../suppliers/sanmar.json">SanMar <span class="stab-count">2,985</span></div>
</div>

<div class="supplier-info" id="supplierInfo"></div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search by name, brand, or code…"/>
  </div>
  <select class="filter-select" id="brandFilter"><option value="">All Brands</option></select>
  <div class="results-count" id="resultsCount"></div>
</div>

<div class="catalog-wrap">
  <div id="productGrid" class="product-grid"></div>
  <div id="pagination" class="pagination"></div>
</div>

<script>
const SUPPLIER_INFO = {
  'carolina-made': {
    name: 'Carolina Made',
    address: '400 Indian Trail Road North, Indian Trail, NC 28079',
    phone: '(800) 222-1409',
    email: 'info@carolinamade.com',
    website: 'https://www.carolinamade.com/',
  },
  'as-colour-us': {
    name: 'AS Colour US',
    address: '',
    phone: '',
    email: '',
    website: 'https://www.ascolour.com/',
  },
  'momentec-brands': {
    name: 'Momentec Brands',
    address: '425 Park West Drive, Grovetown, GA 30813',
    phone: '888-871-0990',
    email: '',
    website: 'https://www.momentecbrands.com/',
  },
  'sanmar': {
    name: 'SanMar',
    address: 'SanMar, Attn: Credit Department, P.O. Box 34060, Seattle, WA 98124-1060',
    phone: '(800) 426-6399',
    email: 'sales@sanmar.com',
    website: 'http://www.sanmar.com',
  },
};

function showSupplierInfo(key) {
  const bar = document.getElementById('supplierInfo');
  const s = SUPPLIER_INFO[key];
  if (!s) { bar.classList.remove('show'); bar.innerHTML = ''; return; }
  bar.innerHTML = `
    <span class="si-name">${s.name}</span>
    ${s.address ? `<span class="si-field"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${s.address}</span>` : ''}
    ${s.phone ? `<span class="si-field"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.63a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.72 16z"/></svg>${s.phone}</span>` : ''}
    ${s.email ? `<span class="si-field"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:${s.email}">${s.email}</a></span>` : ''}
    ${s.website ? `<span class="si-field"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><a href="${s.website}" target="_blank">${s.website}</a></span>` : ''}
  `;
  bar.classList.add('show');
}

const PER_PAGE = 60;
let allProducts   = [];
let filtered      = [];
let currentPage   = 1;
let loadedSuppliers = {};

const SUPPLIERS = [
  { key: 'carolina-made',   file: '../suppliers/carolina-made.json',   label: 'Carolina Made',    cls: 'sup-cm' },
  { key: 'as-colour-us',    file: '../suppliers/as-colour-us.json',     label: 'AS Colour US',     cls: 'sup-ac' },
  { key: 'momentec-brands', file: '../suppliers/momentec-brands.json',  label: 'Momentec Brands',  cls: 'sup-mb' },
  { key: 'sanmar',          file: '../suppliers/sanmar.json',           label: 'SanMar',           cls: 'sup-sm' },
];

function supClass(supplier) {
  const s = supplier.toLowerCase();
  if (s.includes('carolina')) return 'sup-cm';
  if (s.includes('colour') || s.includes('color')) return 'sup-ac';
  if (s.includes('momentec')) return 'sup-mb';
  if (s.includes('sanmar')) return 'sup-sm';
  return 'sup-cm';
}

async function loadSupplier(file) {
  if (loadedSuppliers[file]) return loadedSuppliers[file];
  const r = await fetch(file);
  const data = await r.json();
  loadedSuppliers[file] = data.products || [];
  return loadedSuppliers[file];
}

async function loadTab(supplierKey) {
  showLoading();
  if (supplierKey === 'all') {
    // Load all suppliers
    let combined = [];
    for (const s of SUPPLIERS) {
      const products = await loadSupplier(s.file);
      combined = combined.concat(products);
    }
    allProducts = combined;
  } else {
    const s = SUPPLIERS.find(s => s.key === supplierKey);
    allProducts = await loadSupplier(s.file);
  }
  populateBrandFilter();
  applyFilters();
}

function populateBrandFilter() {
  const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))].sort();
  const sel = document.getElementById('brandFilter');
  sel.innerHTML = '<option value="">All Brands</option>';
  brands.forEach(b => {
    const o = document.createElement('option');
    o.value = b; o.textContent = b;
    sel.appendChild(o);
  });
}

function applyFilters() {
  const q     = document.getElementById('searchInput').value.toLowerCase().trim();
  const brand = document.getElementById('brandFilter').value;
  filtered = allProducts.filter(p => {
    if (brand && p.brand !== brand) return false;
    if (q) {
      const hay = `${p.name} ${p.brand} ${p.code} ${p.supplier}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  currentPage = 1;
  render();
}

function render() {
  const grid  = document.getElementById('productGrid');
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  document.getElementById('resultsCount').textContent =
    `${total.toLocaleString()} product${total !== 1 ? 's' : ''}`;

  if (total === 0) {
    grid.innerHTML = '';
    document.getElementById('pagination').innerHTML = '';
    grid.insertAdjacentHTML('afterend', '<div class="empty">No products match your search.</div>');
    return;
  }
  document.querySelector('.empty')?.remove();

  grid.innerHTML = slice.map(p => {
    let imgSrc = p.referenceImage || p.composedImage || p.img || '';
    // Upgrade low-res thumbnails to full-size across all three URL patterns
    imgSrc = imgSrc
      .replace('/4/prod.jpg', '/1/prod.jpg')           // rshared/pdimages (Carolina Made)
      .replace('/4/prod.png', '/1/prod.png')
      .replace(/-50\.jpg/, '-200.jpg')                  // display_image (SanMar, AS Colour, Momentec)
      .replace(/-50\.png/, '-200.png')
      .replace('/4/1/FFFFFF/prod.jpg', '/1/1/FFFFFF/prod.jpg');  // pcimages fallback
    const img = imgSrc
      ? `<img src="${imgSrc}" alt="${p.code}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-img>No image</div>'">`
      : `<div class="no-img">No image</div>`;
    return `
      <div class="product-card">
        <div class="card-img">${img}</div>
        <div class="card-body">
          <div class="card-code">${p.code}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-brand">${p.brand || ''}</div>
          <div class="card-price">${p.basePrice || ''}</div>
          <span class="card-supplier ${supClass(p.supplier)}">${p.supplier}</span>
        </div>
      </div>`;
  }).join('');

  renderPagination(pages);
}

function renderPagination(pages) {
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }

  let btns = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
  const range = [];
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - currentPage) <= 2) range.push(i);
    else if (range[range.length - 1] !== '…') range.push('…');
  }
  range.forEach(p => {
    if (p === '…') btns += `<span class="page-info">…</span>`;
    else btns += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  });
  btns += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>Next →</button>`;
  btns += `<span class="page-info">Page ${currentPage} of ${pages}</span>`;
  el.innerHTML = btns;
}

function goPage(n) {
  currentPage = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showLoading() {
  document.getElementById('productGrid').innerHTML = '';
  document.getElementById('pagination').innerHTML = `
    <div class="loading" style="grid-column:1/-1">
      <div class="loading-spinner"></div>
      Loading products…
    </div>`;
}

// Tab switching
document.querySelectorAll('.stab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('searchInput').value = '';
    document.getElementById('brandFilter').value = '';
    showSupplierInfo(this.dataset.supplier);
    loadTab(this.dataset.supplier);
  });
});

// Search + filter
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('brandFilter').addEventListener('change', applyFilters);

// Load first tab (Carolina Made by default — faster than loading all 4,256)
showSupplierInfo('carolina-made');
loadTab('carolina-made');
document.querySelector('.stab[data-supplier="carolina-made"]').classList.add('active');
document.querySelector('.stab[data-supplier="all"]').classList.remove('active');
</script>
</body>
</html>
